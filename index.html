<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Document Explorer</title>

<style>
body {
  font-family: sans-serif;
  max-width: 900px;
  margin: 10px;
}

h2 {
  border-bottom: 1px solid #ccc;
  padding-bottom: 5px;
}

#path {
  font-size: 0.9em;
  color: #555;
  margin-bottom: 10px;
}

button {
  margin-bottom: 10px;
}

ul {
  list-style: none;
  padding: 0;
}

li {
  padding: 6px;
  border-bottom: 1px solid #eee;
  display: flex;
  justify-content: space-between;
  flex-direction: column;
  align-items: flex-start
}

.folder {
  font-weight: bold;
  cursor: pointer;
}

.file-actions a {
  margin-left: 10px;
  font-size: 0.9em;
  margin-top: 5px;
}

@media (max-width: 600px) {
  li {
    flex-direction: column;
    align-items: flex-start;
  }

  .file-actions a {
    margin-left: 0;
    margin-right: 10px;
  }
}

</style>
</head>

<body>

<h2>Documents</h2>
<div id="path"></div>
<button onclick="goBack()">⬅ Back</button>

<ul id="fileList">Loading...</ul>

<script>
const username = "pccor601";
const repo = "Aurelius";
const ROOT = "Documents";

let currentPath = ROOT;
let historyStack = [];

function loadFolder(path) {
  const apiUrl = `https://api.github.com/repos/${username}/${repo}/contents/${path}`;

  fetch(apiUrl)
    .then(res => res.json())
    .then(data => {

      if (!Array.isArray(data)) {
        document.getElementById("fileList").innerHTML = "Folder not found.";
        return;
      }

      // Sort: folders first, then files
      data.sort((a, b) => {
        if (a.type === b.type) return a.name.localeCompare(b.name);
        return a.type === "dir" ? -1 : 1;
      });

      const list = document.getElementById("fileList");
      list.innerHTML = "";

      document.getElementById("path").textContent = path;

      data.forEach(item => {
        const li = document.createElement("li");

        if (item.type === "dir") {
          const span = document.createElement("span");
          span.textContent = "📁 " + item.name;
          span.className = "folder";

          span.onclick = () => {
            historyStack.push(currentPath);
            currentPath = item.path;
            loadFolder(currentPath);
          };

          li.appendChild(span);

        } else {
          const name = document.createElement("span");
          name.textContent = "📄 " + item.name;

          const actions = document.createElement("span");
          actions.className = "file-actions";

          const openLink = document.createElement("a");
          if (item.name.endsWith(".html")) {
            openLink.href = `https://pccor601.github.io/Aurelius/${item.path}`;
          } else {
            openLink.href = item.download_url;
          }
          openLink.textContent = "Open";
          openLink.target = "_blank";

          const downloadLink = document.createElement("a");
          downloadLink.href = item.download_url;
          downloadLink.textContent = "Download";
          downloadLink.setAttribute("download", "");

          actions.appendChild(openLink);
          actions.appendChild(downloadLink);

          li.appendChild(name);
          li.appendChild(actions);
        }

        list.appendChild(li);
      });
    })
    .catch(err => {
      document.getElementById("fileList").innerHTML = "Error loading folder.";
      console.error(err);
    });
}

function goBack() {
  if (historyStack.length > 0) {
    currentPath = historyStack.pop();
    loadFolder(currentPath);
  }
}

loadFolder(ROOT);
</script>

</body>
</html>
